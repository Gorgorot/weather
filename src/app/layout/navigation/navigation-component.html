<div [class.nav-header--collapsed]="collapsed()" class="nav-header">
  <button (click)="toggleSideNav.emit()" class="nav-burger" mat-icon-button>
    <mat-icon>menu</mat-icon>
  </button>
  <span class="nav-title">{{ title() }}</span>
</div>

<div class="nav-links">
  @for (link of links; track link.path) {
    <a [class.link--collapsed]="collapsed()" [matTooltipDisabled]="!collapsed()"
       [matTooltip]="link.text" [routerLink]="link.path"
       class="link" matTooltipPosition="right" routerLinkActive="link-active">
      <mat-icon class="link-icon">{{ link.icon }}</mat-icon>
      <div class="link-description">
        <span class="link-text">{{ link.text }}</span>
        <span class="link-text link-text--small">{{ link.description }}</span>
      </div>
    </a>
  }
</div>
