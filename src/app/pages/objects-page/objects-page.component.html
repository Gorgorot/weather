@let _objectWeatherInfo = objectWeatherInfo();

<h1 class="page-title">Объекты</h1>

<section class="content">
  <div class="objects-list">
    @for (item of _objectWeatherInfo; track item.objectId) {
      <app-weather-card (additionalInfo)="onCardAdditionalInfo($event)" [weatherInfo]="item"/>
    }
  </div>
</section>

<div class="quick-statistic-wrapper">
  <router-outlet/>
</div>
